name: flutter_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  just_audio: ^0.10.5
  flutter_riverpod: ^2.5.1
  dio: ^5.9.2
  on_audio_query: ^2.9.0
  permission_handler: ^12.0.1
  path_provider: ^2.1.5
  freezed_annotation: ^3.1.0
  dartz: ^0.10.1
  flutter_secure_storage: ^10.0.0
  file_picker: ^8.1.2
  just_audio_background: ^0.0.1-beta.16
  audio_service: ^0.18.18
  flutter_native_splash: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  freezed: ^3.2.5
  mockito: ^5.4.4
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#121212"
  adaptive_icon_foreground: "assets/images/logo.png"
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

flutter_native_splash:
  color: "#121212"
  image: assets/images/logo.png
  android: true
  ios: true
  fullscreen: true
  android_12:
    image: assets/images/logo.png
    color: "#121212"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
