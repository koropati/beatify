name: Deploy Backend to Shared Hosting

on:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: backend
        run: pytest tests/ -v

  deploy:
    name: Deploy to Shared Hosting
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cat > backend/.env << EOF
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          EOF

      - name: Copy backend files to server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          source: "backend"
          target: ${{ secrets.APP_DIR }}
          rm: false
          exclude: |
            backend/.git
            backend/__pycache__
            backend/*.pyc
            backend/.env.example
            backend/venv
            backend/.venv
            backend/*.db
            backend/test_beatify.db
            backend/tests

      - name: Install dependencies, seed database, and restart app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          script: |
            source ${{ secrets.VENV_PATH }}
            cd ${{ secrets.APP_DIR }}/backend
            pip install -r requirements.txt
            mkdir -p media
            mkdir -p tmp
            python seed.py
            touch tmp/restart.txt
