name: Deploy Backend to Shared Hosting

on:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: backend
        run: pytest tests/ -v

  deploy:
    name: Deploy to Shared Hosting
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cat > backend/.env << EOF
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          EOF

      - name: Create deployment archive
        run: |
          cd backend
          tar --exclude='.git' \
              --exclude='__pycache__' \
              --exclude='*.pyc' \
              --exclude='.env.example' \
              --exclude='venv' \
              --exclude='.venv' \
              --exclude='*.db' \
              --exclude='test_beatify.db' \
              --exclude='tests' \
              --exclude='setup_github_secrets.py' \
              -czf ../deploy.tar.gz .

      - name: Upload archive to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          source: "deploy.tar.gz"
          target: "/tmp"

      - name: Extract, install dependencies, seed, and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          script: |
            tar -xzf /tmp/deploy.tar.gz -C ${{ secrets.APP_DIR }}/
            rm -f /tmp/deploy.tar.gz
            source ${{ secrets.VENV_PATH }}
            cd ${{ secrets.APP_DIR }}
            pip install -r requirements.txt
            mkdir -p media tmp
            python seed.py
            touch tmp/restart.txt
